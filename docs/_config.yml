# GitHub Pages Configuration for HaloUI Documentation

title: HaloUI Documentation
description: A modern, composable Blade UI component library for Laravel
baseurl: "/halo-ui"
url: "https://AureDulvresse.github.io"

theme: jekyll-theme-cayman

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md

collections:
  components:
    output: true
    permalink: /components/:name

defaults:
  - scope:
      path: ""
      type: "components"
    values:
      layout: "component"

# Only components that actually exist in resources/views/components/halo/
# are listed here. Add an entry (and its docs/{name}.md) when a component
# ships — not before.
